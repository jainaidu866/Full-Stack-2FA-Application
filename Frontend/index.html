<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | 2FA App</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="card">

      <div class="logo">
        <div class="logo-icon">🔐</div>
        <span class="logo-text">SecureAuth</span>
      </div>

      <h1>Create Account</h1>
      <p class="subtitle">Register to get started with secure two-factor authentication.</p>

      <div class="form-group">
        <label>Username</label>
        <input id="reg-username" type="text" placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="reg-password" type="password" placeholder="Enter your password">
      </div>

      <button class="btn btn-primary" onclick="register()">Create Account</button>

      <div id="msg" class="msg"></div>

      <div class="link-row">
        Already have an account? <a href="/login-page">Login</a>
      </div>

    </div>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
