<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | 2FA App</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <div class="card">

      <div class="logo">
        <div class="logo-icon">🔐</div>
        <span class="logo-text">SecureAuth</span>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Login with your credentials to access your secure dashboard.</p>

      <div class="form-group">
        <label>Username</label>
        <input id="login-username" type="text" placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="Enter your password">
      </div>

      <button class="btn btn-primary" onclick="login()">Login</button>

      <div id="msg" class="msg"></div>

      <div class="link-row">
        Don't have an account? <a href="/">Register</a>
      </div>

    </div>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
